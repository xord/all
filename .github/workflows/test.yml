name: Test

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

jobs:
  test:
    strategy:
      matrix:
        os:   [macos-latest, windows-latest, ubuntu-latest]
        ruby: ['3.2', '3.3', '3.4', '4.0']
      fail-fast: false

    runs-on: ${{matrix.os}}

    steps:
      - name: ruby ${{matrix.ruby}}
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: ${{matrix.ruby}}

      - name: checkout
        uses: actions/checkout@v4

      - name: packages
        run: rake verbose packages

      - name: lib
        run: rake verbose lib

      - name: ext
        run: rake verbose ext

      - name: test
        if: runner.os == 'macos'
        run: rake verbose test

      - name: test
        if: runner.os == 'windows'
        run: rake verbose xot rucy rays reflex test
