name: Build WASM

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: ruby 3.2
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: 3.2

      - name: checkout
        uses: actions/checkout@v4

      - name: install emscripten
        uses: mymindstorm/setup-emsdk@v14
        with:
          version: 5.0.7

      - name: build
        run: cd reight/wasm && rake build

      - name: get version and sha
        id: ver
        run: |
          echo "version=$(cat reight/VERSION)"       >> $GITHUB_OUTPUT
          echo "sha=$(git rev-parse --short=8 HEAD)" >> $GITHUB_OUTPUT

      - name: upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: reight-${{ steps.ver.outputs.version }}-${{ steps.ver.outputs.sha }}
          path: reight/wasm/output/
          retention-days: 7
